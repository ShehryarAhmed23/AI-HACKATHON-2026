<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpHub AI | Request Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body data-page="detail">
    <header class="topbar">
      <div class="container nav">
        <a class="brand" href="./index.html"><span class="brand-badge">H</span><span>HelpHub AI</span></a>
        <nav class="nav-links">
          <a href="./dashboard.html">Dashboard</a>
          <a href="./explore.html">Explore</a>
          <a href="./create-request.html">Create Request</a>
          <a href="./messages.html">Messages</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="page-hero">
        <div class="panel">
          <p class="eyebrow">Request Detail</p>
          <div class="card-meta" data-request-meta></div>
          <h1 style="font-size: clamp(2rem, 4vw, 3.8rem);" data-request-title></h1>
          <p data-request-description></p>
        </div>
      </section>

      <section class="detail-grid section">
        <div class="stack">
          <article class="panel stack">
            <p class="section-kicker">AI Summary</p>
            <h2>What this request needs</h2>
            <p data-request-summary></p>
            <div class="tag-row" data-request-tags></div>
          </article>

          <article class="panel stack">
            <p class="section-kicker">Actions</p>
            <div class="row">
              <button class="btn btn-primary" type="button" data-cta-help>I can help</button>
              <button class="btn btn-secondary" type="button" data-cta-solved>Mark as solved</button>
            </div>
          </article>
        </div>

        <div class="stack">
          <article class="panel stack">
            <p class="section-kicker">Requester</p>
            <div data-request-requester></div>
          </article>

          <article class="panel stack">
            <p class="section-kicker">Attachments</p>
            <div data-request-attachment></div>
          </article>

          <article class="panel stack">
            <p class="section-kicker">Helpers</p>
            <h3>People ready to support</h3>
            <div class="helper-list" data-helper-list></div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
